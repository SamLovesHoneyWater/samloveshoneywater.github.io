<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Sam Huang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #1a2332;
            --secondary-gray: #4a5568;
            --light-gray: #f7fafc;
            --accent-teal: #2d7d8a;
            --warm-white: #fefefe;
            --border-light: #e2e8f0;
            --text-muted: #718096;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', serif;
            line-height: 1.7;
            color: var(--primary-navy);
            background-color: var(--warm-white);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            background: var(--warm-white);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--primary-navy);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: var(--secondary-gray);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-teal);
        }

        /* Page Header */
        .page-header {
            padding: 3rem 0;
            background: var(--light-gray);
            text-align: center;
        }

        .page-header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary-navy);
            margin-bottom: 1rem;
        }

        .page-header p {
            font-size: 1.2rem;
            color: var(--secondary-gray);
            font-style: italic;
        }

        /* Blog List */
        .blog-list {
            padding: 4rem 0;
        }

        .blog-item {
            background: var(--warm-white);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .blog-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(26, 35, 50, 0.1);
            text-decoration: none;
            color: inherit;
        }

        .blog-category {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--accent-teal);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .blog-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-navy);
        }

        .blog-excerpt {
            color: var(--secondary-gray);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .blog-meta {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Back Navigation */
        .back-nav {
            padding: 2rem 0;
            text-align: center;
        }

        .back-link {
            font-family: 'Inter', sans-serif;
            color: var(--accent-teal);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary-navy);
        }

        /* Footer */
        footer {
            background: var(--primary-navy);
            color: var(--warm-white);
            padding: 3rem 0;
            text-align: center;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .social-links a {
            color: var(--warm-white);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-teal);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .nav-links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">Sam Huang</a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#blog">Blog</a></li>
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>All Blog Posts</h1>
                <p>Exploring ideas at the intersection of technology, cognition, and society</p>
            </div>
        </section>

        <section class="blog-list">
            <div class="container">
                <div id="blog-list-container">
                    <div class="loading">Loading blog posts...</div>
                </div>
                
                <div class="back-nav">
                    <a href="index.html#blog" class="back-link">← Back to Homepage</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="social-links">
                    <a href="#">GitHub</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Twitter</a>
                    <a href="#">Email</a>
                </div>
                <p>&copy; 2025 Sam Huang. Built with curiosity and code.</p>
            </div>
        </div>
    </footer>

    <script src="js/blog-catalogue.js"></script>
</body>
</html>
